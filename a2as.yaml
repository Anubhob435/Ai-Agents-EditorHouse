    module: Ai-book-adk.sub_agents.thinker_agent.tools
    args: [book_title]
    params:
      returns: bool
  story_pipeline:
    type: sync
    module: Ai-book-adk.sub_agents.writer_agent.tools
    args: [topic]
    params:
      returns: str
  sync_all_books_to_mongodb:
    type: sync
    module: Ai-book-adk.sub_agents.thinker_agent.tools
    params:
      returns: str
  table_of_contents_generator:
    type: sync
    module: Ai-book-adk.sub_agents.thinker_agent.tools
    args: [book_plan]
    params:
      returns: str
  update_chapter:
    type: sync
    module: Ai-book-adk.sub_agents.thinker_agent.tools
    args: [self, chapter_index, filename, content]
  write_next_chapter:
    type: sync
    module: Ai-book-adk.tools
    args: [book_title]
    params:
      returns: Optional[str]
  writer_agent:
    type: sync
    module: Ai-book-adk.sub_agents.writer_agent.tools
    args: [title]
    params:
      returns: str

variables:
  GOOGLE_API_KEY:
    type: env
    params:
      caller: [os.getenv, genai.Client, os.environ.get]
      path: [others.editor, Ai-book-adk.sub_agents.editor_agent.tools, others.illustrator, Ai-book-adk.sub_agents.writer_agent.tools,
        Ai-book-adk.tools, others.main, Ai-book-adk.sub_agents.publisher_agent.tools, Ai-book-adk.sub_agents.thinker_agent.tools]
  MONGODB_CONNECTION_STRING:
    type: env
    params:
      caller: [os.getenv]
      path: [Ai-book-adk.sub_agents.thinker_agent.tools]

files:
  ./:
    type: pattern
    actions: [read]
    params:
      patterns: [chapter_*.md, '*.md']
      caller: [enhance_book_formatting, regenerate_book_chapters]
  .md:
    type: literal
    actions: [read]
    params:
      caller: [compile_book]
      path: [book_metadata.book_dir]
  _metadata_export.json:
    type: literal
    actions: [read]
    params:
      caller: [compile_book]
      path: [book_metadata.book_dir]
  book_dir:
    type: variable
    actions: [read]
    params:
      caller: [book_dir.glob, book_dir.iterdir, Path]
  book_metadata.json:
    type: literal
    actions: [read]
    params:
      caller: [get_book_status, __init__, sync_all_books_to_mongodb]
      path: [item]
  book_metadata_path:
    type: literal
    actions: [read]
    params:
      caller: [Path('books/book_book_about_broken_love/book_metadata.json'), open, json.load]
  books/book_book_about_broken_love:
    type: literal
    actions: [read]
    params:
      caller: [regenerate_book_chapters]
  books/book_book_about_broken_love/book_metadata.json:
    type: literal
    actions: [read]
    params:
      caller: [regenerate_book_chapters]
  chapter_filepath:
    type: variable
    actions: [read]
    params:
      caller: [Path]
  filepath:
    type: literal
    actions: [read, write]
    params:
      caller: [Path(chapter_filepath), open, image.save]
  illustrations_dir:
    type: variable
    actions: [read]
    params:
      caller: [os.path.exists, os.makedirs, illustrations_dir.iterdir]
  metadata_file:
    type: variable
    actions: [read]
    params:
      caller: [open, json.load]
      alias: [f]
  old_file:
    type: variable
    actions: [delete]
    params:
      caller: [old_file.unlink]
  tools.py:
    type: literal
    actions: [read]
    params:
      caller: [regenerate_book_chapters]
      path: [Path.parent]
